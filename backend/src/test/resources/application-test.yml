spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MariaDB;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        globally_quoted_identifiers: true
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/testmigration

  # Phase 29 — 기본 stub mode 유지 (mail 블록 미설정 → application.yml 의 ${MAIL_HOST:} 빈 default
  # → MailSenderAutoConfiguration 이 JavaMailSender bean 미생성 → ApprovalEmailSender stub path).
  # GreenMail 통합 테스트는 @TestPropertySource 로 spring.mail.host/port/username 등 override.
  # SMTP-related 기존 테스트(DocumentSubmitTest/ApprovalWorkflowTest)는 stub mode 로 무영향.
  #
  # NOTE: 만약 GreenMail 테스트에서 추가 properties 가 필요하면 @TestPropertySource 에서 같이 명시:
  #   - spring.mail.username, password, properties.mail.smtp.auth=false,
  #     properties.mail.smtp.starttls.required=false, properties.mail.mime.charset=UTF-8

jwt:
  secret: test-secret-key-must-be-at-least-32-bytes-long-for-hs256-testing
  access-token-ttl: 1800000
  refresh-token-ttl: 1209600000

management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    mail:
      enabled: false

# Phase 29 — 통합 테스트에서 이메일 CTA URL 검증 + @Retryable backoff 제거
app:
  base-url: http://127.0.0.1:5173
  mail:
    retry:
      delay-ms: 0   # @Backoff(delayExpression = "#{${app.mail.retry.delay-ms:300000}}") override — 테스트는 backoff 대기 없이 즉시 재시도
