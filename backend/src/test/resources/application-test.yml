spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MariaDB;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        globally_quoted_identifiers: true
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/testmigration

  # Phase 29 — GreenMail SMTP 통합 테스트 (port 3025 = ServerSetupTest.SMTP default)
  mail:
    host: 127.0.0.1
    port: 3025
    username: noreply@micesign.test   # From 주소로 사용됨 (auth 는 properties.mail.smtp.auth=false 로 비활성)
    password: dummy                    # auth=false 라 실제 사용 안 됨, 빈 값 회피용
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: false            # GreenMail 은 user 등록 없이는 auth 실패 — test 는 plain SMTP
          starttls:
            enable: false        # GreenMail plain SMTP
            required: false      # 메인 application.yml 의 starttls.required=true override
        mime:
          charset: UTF-8

jwt:
  secret: test-secret-key-must-be-at-least-32-bytes-long-for-hs256-testing
  access-token-ttl: 1800000
  refresh-token-ttl: 1209600000

management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    mail:
      enabled: false

# Phase 29 — 통합 테스트에서 이메일 CTA URL 검증 + @Retryable backoff 제거
app:
  base-url: http://127.0.0.1:5173
  mail:
    retry:
      delay-ms: 0   # @Backoff(delayExpression = "#{${app.mail.retry.delay-ms:300000}}") override — 테스트는 backoff 대기 없이 즉시 재시도
