spring:
  application:
    name: micesign
  datasource:
    url: jdbc:mariadb://${DB_HOST:10.211.55.21}:${DB_PORT:3306}/${DB_NAME:micesign}
    username: ${DB_USER:p30}
    password: ${DB_PASS:wild0235!}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        globally_quoted_identifiers: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 250MB
  flyway:
    enabled: true
    locations: classpath:db/migration
    ignore-migration-patterns: "*:missing"
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

jwt:
  secret: ${JWT_SECRET:defaultDevSecretKeyThatIsAtLeast32CharsLong!!}
  access-token-ttl: 1800000      # 30 minutes in milliseconds
  refresh-token-ttl: 1209600000  # 14 days in milliseconds

app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  cookie:
    secure: ${COOKIE_SECURE:false}
  # Phase 29 D-D3 — @Retryable backoff 기본 5분 (300000ms). test profile에서 0으로 override 하여 backoff 대기 없이 검증.
  mail:
    retry:
      delay-ms: ${APP_MAIL_RETRY_DELAY_MS:300000}

google:
  drive:
    credentials-path: ${GOOGLE_DRIVE_CREDENTIALS_PATH:}
    root-folder-name: MiceSign

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Budget API Integration
budget:
  api:
    base-url: ${BUDGET_API_BASE_URL:http://localhost:8090}
    connect-timeout: 3
    read-timeout: 5
    api-key: ${BUDGET_API_KEY:mock-api-key}
