spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:micesign}
    username: ${DB_USER:}
    password: ${DB_PASS:}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

app:
  cookie:
    secure: true

logging:
  level:
    com.micesign: INFO
