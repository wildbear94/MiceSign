spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:micesign}
    # Phase 33 D-C1 — 운영 자격증명은 env var only.
    # /etc/micesign/.env.production (chmod 600) 에서 EnvironmentFile= 로 주입.
    # default 비워둠으로써 미주입 시 HikariCP startup 실패 → 사고 fail-fast.
    username: ${DB_USER:}
    password: ${DB_PASS:}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

app:
  # Phase 29 D-D2 — BaseUrlGuard(@Profile("prod")) 가 localhost 감지 시 startup 실패시킴 (Pitfall 5)
  # 배포 시 APP_BASE_URL env var 를 실 사내 도메인으로 주입 필수
  base-url: ${APP_BASE_URL:https://micesign.사내도메인}
  cookie:
    secure: true

logging:
  level:
    com.micesign: INFO
