<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{email/layouts/approval-base :: layout(~{::body})}">
<body>
    <!-- SUBMIT — 첫 번째 비-REFERENCE 승인자에게 상신 알림 -->
    <h2 style="color:#1e293b; margin:0 0 16px 0; font-size:18px;">새 결재 요청이 도착했습니다</h2>
    <p style="color:#334155; line-height:1.6;">
        <span th:text="${recipientName}">수신자</span>님, 아래 문서의 결재를 요청합니다. 검토 후 승인 또는 반려해 주세요.
    </p>

    <!-- 메타데이터 테이블 (공통) -->
    <table style="background-color:#f8fafc; border-radius:6px; padding:16px; width:100%; margin:16px 0; border-collapse:separate; border-spacing:0;">
        <tr>
            <td style="padding:8px 16px; color:#64748b; font-size:14px; width:30%;">문서번호</td>
            <td style="padding:8px 16px; color:#1e293b; font-size:14px;" th:text="${docNumber}">GEN-2026-0001</td>
        </tr>
        <tr>
            <td style="padding:8px 16px; color:#64748b; font-size:14px;">제목</td>
            <td style="padding:8px 16px; color:#1e293b; font-size:14px;" th:text="${docTitle}">문서 제목</td>
        </tr>
        <tr>
            <td style="padding:8px 16px; color:#64748b; font-size:14px;">기안자</td>
            <td style="padding:8px 16px; color:#1e293b; font-size:14px;">
                <span th:text="${drafterDepartment}">부서</span> <span th:text="${drafterName}">이름</span>
            </td>
        </tr>
        <tr>
            <td style="padding:8px 16px; color:#64748b; font-size:14px;">상신일시</td>
            <td style="padding:8px 16px; color:#1e293b; font-size:14px;"
                th:text="${#temporals.format(eventTime, 'yyyy-MM-dd HH:mm')}">2026-04-23 10:00</td>
        </tr>
    </table>
</body>
</html>
