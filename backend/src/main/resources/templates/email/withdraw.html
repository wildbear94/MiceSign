<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <title>회수</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f5f5;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f5f5;padding:24px 0;">
    <tr>
        <td align="center">
            <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
                <!-- Header -->
                <tr>
                    <td style="background-color:#2563eb;padding:24px 32px;">
                        <h1 style="margin:0;color:#ffffff;font-size:20px;font-weight:700;">MiceSign 전자결재</h1>
                    </td>
                </tr>
                <!-- Body -->
                <tr>
                    <td style="padding:32px;">
                        <p style="margin:0 0 24px;font-size:16px;color:#111827;font-weight:600;">문서가 회수되었습니다</p>
                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #e5e7eb;border-radius:6px;overflow:hidden;margin-bottom:24px;">
                            <tr style="background-color:#f9fafb;">
                                <td style="padding:10px 16px;font-size:13px;color:#6b7280;width:100px;border-bottom:1px solid #e5e7eb;">문서제목</td>
                                <td style="padding:10px 16px;font-size:14px;color:#111827;border-bottom:1px solid #e5e7eb;" th:text="${documentTitle}">문서 제목</td>
                            </tr>
                            <tr>
                                <td style="padding:10px 16px;font-size:13px;color:#6b7280;width:100px;border-bottom:1px solid #e5e7eb;">문서번호</td>
                                <td style="padding:10px 16px;font-size:14px;color:#111827;border-bottom:1px solid #e5e7eb;" th:text="${docNumber}">GEN-2026-0001</td>
                            </tr>
                            <tr style="background-color:#f9fafb;">
                                <td style="padding:10px 16px;font-size:13px;color:#6b7280;width:100px;border-bottom:1px solid #e5e7eb;">기안자</td>
                                <td style="padding:10px 16px;font-size:14px;color:#111827;border-bottom:1px solid #e5e7eb;" th:text="${drafterName}">홍길동</td>
                            </tr>
                            <tr>
                                <td style="padding:10px 16px;font-size:13px;color:#6b7280;width:100px;">상태</td>
                                <td style="padding:10px 16px;font-size:14px;color:#111827;" th:text="${statusLabel}">회수</td>
                            </tr>
                        </table>
                        <!-- CTA Button -->
                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                                <td align="center">
                                    <a th:href="${documentUrl}" style="display:inline-block;background-color:#2563eb;color:#ffffff;text-decoration:none;padding:12px 32px;border-radius:6px;font-size:14px;font-weight:600;">문서 확인하기</a>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <!-- Footer -->
                <tr>
                    <td style="padding:16px 32px;background-color:#f9fafb;border-top:1px solid #e5e7eb;">
                        <p style="margin:0;font-size:12px;color:#9ca3af;text-align:center;">이 메일은 MiceSign 전자결재 시스템에서 자동 발송되었습니다.</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
