<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>등록 신청 결과 안내</title>
</head>
<body style="margin:0; padding:0; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; background-color:#f5f5f5;">
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px; margin:20px auto; background-color:#ffffff; border-radius:8px; overflow:hidden;">
        <tr>
            <td style="background-color:#2563eb; padding:24px 32px;">
                <h1 style="color:#ffffff; margin:0; font-size:20px;">MiceSign</h1>
            </td>
        </tr>
        <tr>
            <td style="padding:32px;">
                <h2 style="color:#1e293b; margin:0 0 16px 0; font-size:18px;">등록 신청 결과 안내</h2>
                <p style="color:#334155; line-height:1.6; margin:0 0 12px 0;">
                    <span th:text="${name}">홍길동</span>님, 등록 신청이 거부되었습니다.
                </p>
                <table style="background-color:#fef2f2; border-radius:6px; padding:16px; width:100%; margin:16px 0; border:1px solid #fecaca;">
                    <tr>
                        <td style="padding:8px 16px; color:#991b1b; font-size:14px; font-weight:bold;">거부 사유</td>
                    </tr>
                    <tr>
                        <td style="padding:8px 16px; color:#1e293b; font-size:14px;" th:text="${rejectionReason}">사유 내용</td>
                    </tr>
                </table>
                <p style="color:#334155; line-height:1.6; margin:16px 0 0 0;">
                    다시 신청하실 수 있습니다.
                </p>
            </td>
        </tr>
        <tr>
            <td style="padding:16px 32px; background-color:#f8fafc; border-top:1px solid #e2e8f0;">
                <p style="color:#94a3b8; font-size:12px; margin:0; text-align:center;">
                    이 알림은 MiceSign 시스템에서 자동 발송되었습니다.
                </p>
            </td>
        </tr>
    </table>
</body>
</html>
