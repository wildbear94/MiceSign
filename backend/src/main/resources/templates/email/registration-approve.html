<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>등록 신청 승인 완료</title>
</head>
<body style="margin:0; padding:0; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; background-color:#f5f5f5;">
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px; margin:20px auto; background-color:#ffffff; border-radius:8px; overflow:hidden;">
        <tr>
            <td style="background-color:#2563eb; padding:24px 32px;">
                <h1 style="color:#ffffff; margin:0; font-size:20px;">MiceSign</h1>
            </td>
        </tr>
        <tr>
            <td style="padding:32px;">
                <h2 style="color:#1e293b; margin:0 0 16px 0; font-size:18px;">등록 신청 승인 완료</h2>
                <p style="color:#334155; line-height:1.6; margin:0 0 12px 0;">
                    <span th:text="${name}">홍길동</span>님, 등록 신청이 승인되었습니다.
                </p>
                <p style="color:#334155; line-height:1.6; margin:0 0 12px 0;">
                    이제 로그인하실 수 있습니다.
                </p>
                <table style="background-color:#f8fafc; border-radius:6px; padding:16px; width:100%; margin:16px 0;">
                    <tr>
                        <td style="padding:8px 16px; color:#64748b; font-size:14px;">승인일시</td>
                        <td style="padding:8px 16px; color:#1e293b; font-size:14px;" th:text="${approvedDate}">2026-01-01 00:00</td>
                    </tr>
                </table>
                <div style="text-align:center; margin:24px 0;">
                    <a th:href="${loginUrl}" style="display:inline-block; background-color:#2563eb; color:#ffffff; padding:12px 32px; text-decoration:none; border-radius:6px; font-size:14px; font-weight:bold;">
                        로그인하기
                    </a>
                </div>
            </td>
        </tr>
        <tr>
            <td style="padding:16px 32px; background-color:#f8fafc; border-top:1px solid #e2e8f0;">
                <p style="color:#94a3b8; font-size:12px; margin:0; text-align:center;">
                    이 알림은 MiceSign 시스템에서 자동 발송되었습니다.
                </p>
            </td>
        </tr>
    </table>
</body>
</html>
